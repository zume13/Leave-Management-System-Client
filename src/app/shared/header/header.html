<header class="border-b bg-white">
  <div
    class="
      mx-auto
      flex
      h-16
      max-w-7xl
      items-center
      justify-between
      px-4
      lg:px-8
    "
  >

    <!-- Logo -->
    <a
      routerLink="/"
      class="text-lg font-bold"
    >
      MyApp
    </a>

    <!-- Desktop Navigation -->
    <nav class="hidden md:flex items-center gap-6">
      <a routerLink="/" class="hover:text-sky-600">
        Home
      </a>

      <a routerLink="/products" class="hover:text-sky-600">
        Products
      </a>

      <a routerLink="/about" class="hover:text-sky-600">
        About
      </a>

      <a routerLink="/contact" class="hover:text-sky-600">
        Contact
      </a>
    </nav>

    <!-- Desktop Actions -->
    <div class="hidden md:flex items-center gap-3">
      <button
        class="
          rounded-lg
          border
          px-4
          py-2
        "
      >
        Sign In
      </button>

      <button
        class="
          rounded-lg
          bg-sky-600
          px-4
          py-2
          text-white
        "
      >
        Sign Up
      </button>
    </div>

    <!-- Mobile Menu Button -->
    <button
      class="md:hidden"
      (click)="toggleMenu()"
    >
      ☰
    </button>

  </div>

  <!-- Mobile Menu -->
    <div class="overflow-hidden transition-all duration-300 ease-in-out md:hidden border-t"
        [class.max-h-0]="!mobileMenuOpen()"
        [class.opacity-0]="!mobileMenuOpen()"
        [class.pointer-events-none]="!mobileMenuOpen()"
        [class.max-h-96]="mobileMenuOpen()"
        [class.opacity-100]="mobileMenuOpen()">
      <nav class="flex flex-col gap-4 p-4">
        
        <a routerLink="/" (click)="closeMenu()">
          Home
        </a>

        <a  routerLink="/products" (click)="closeMenu()">
          Products
        </a>

        <a routerLink="/about" (click)="closeMenu()">
          About
        </a>

        <a routerLink="/contact" (click)="closeMenu()">
          Contact
        </a>

        <hr>

        <button class=" rounded-lg border px-4 py-2">
          Sign In
        </button>

        <button class=" rounded-lg bg-sky-600 px-4 py-2 text-white">
          Sign Up
        </button>

      </nav>
    </div>

</header>
