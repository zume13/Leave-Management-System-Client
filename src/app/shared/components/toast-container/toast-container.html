<div class="fixed top-20 right-4 z-50 flex flex-col gap-3">
  @for (toast of toastService.toast(); track toast.id) 
  {
    <div class="w-60 rounded-xl px-4 py-3 text-white text-center text-wrap shadow-lg" [ngClass]='getToastClasses(toast.type)'>
      {{ toast.message }}
    
    </div>
  }
</div>

<button (click)="button()">click me</button>
