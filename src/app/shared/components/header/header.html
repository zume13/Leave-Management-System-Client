<header class="border-b bg-emerald-800 font-stack">
  <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-8">
    <!-- Logo -->
    <a routerLink="/" class="text-lg text-white font-bold">
      Leave Management
    </a>

  <!-- Desktop Navigation -->
    @if (showProfile()) {
      <div class="relative hidden md:flex md:flex-col md:items-center">
        <button
          (click)="toggleProfileMenu()"
          class="rounded-full p-1 transition hover:bg-emerald-700"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="2.5em" height="2.5em" viewBox="0 0 24 24">
            <path d="M0 0h24v24H0z" fill="none" />
            <path
              fill="#fff9f9"
              fill-rule="evenodd"
              d="M12 4a8 8 0 0 0-6.96 11.947A4.99 4.99 0 0 1 9 14h6a4.99 4.99 0 0 1 3.96 1.947A8 8 0 0 0 12 4m7.943 14.076q.188-.245.36-.502A9.96 9.96 0 0 0 22 12c0-5.523-4.477-10-10-10S2 6.477 2 12a9.96 9.96 0 0 0 2.057 6.076l-.005.018l.355.413A9.98 9.98 0 0 0 12 22q.324 0 .644-.02a9.95 9.95 0 0 0 5.031-1.745a10 10 0 0 0 1.918-1.728l.355-.413zM12 6a3 3 0 1 0 0 6a3 3 0 0 0 0-6"
              clip-rule="evenodd"
            />
          </svg>
        </button>

        @if (showMenu()) {
          <div
            class="absolute left-1/2 top-full mt-2 w-44 -translate-x-1/2 overflow-hidden rounded-lg bg-white shadow-lg ring-1 ring-black/10 z-50"
          >
            <button
              class="flex w-full items-center justify-center gap-2 px-4 py-3 hover:bg-gray-100"
            >
              <span>Settings</span>
            </button>

            <button
              (click)="logout()"
              class="flex w-full items-center justify-center gap-2 px-4 py-3 text-red-600 hover:bg-red-50"
            >
              <span>Log out</span>
            </button>
          </div>
        }
      </div>
    }

    <!-- Mobile -->
    @if (showProfile()) {
      <div class="relative flex flex-col items-center md:hidden">
        <button
          (click)="toggleProfileMenu()"
          class="rounded-full p-1 transition hover:bg-emerald-700"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="2.5em" height="2.5em" viewBox="0 0 24 24">
            <path d="M0 0h24v24H0z" fill="none" />
            <path
              fill="#fff9f9"
              fill-rule="evenodd"
              d="M12 4a8 8 0 0 0-6.96 11.947A4.99 4.99 0 0 1 9 14h6a4.99 4.99 0 0 1 3.96 1.947A8 8 0 0 0 12 4m7.943 14.076q.188-.245.36-.502A9.96 9.96 0 0 0 22 12c0-5.523-4.477-10-10-10S2 6.477 2 12a9.96 9.96 0 0 0 2.057 6.076l-.005.018l.355.413A9.98 9.98 0 0 0 12 22q.324 0 .644-.02a9.95 9.95 0 0 0 5.031-1.745a10 10 0 0 0 1.918-1.728l.355-.413zM12 6a3 3 0 1 0 0 6a3 3 0 0 0 0-6"
              clip-rule="evenodd"
            />
          </svg>
        </button>

        @if (showMenu()) {
          <div
            class="absolute left-1/2 top-full mt-2 w-44 -translate-x-1/2 overflow-hidden rounded-lg bg-white shadow-lg ring-1 ring-black/10 z-50"
          >
            <button
              class="flex w-full items-center justify-center gap-2 px-4 py-3 hover:bg-gray-100"
            >
              <span>Settings</span>
            </button>

            <button
              (click)="logout()"
              class="flex w-full items-center justify-center gap-2 px-4 py-3 text-red-600 hover:bg-red-50"
            >
              <span>Log out</span>
            </button>
          </div>
        }
      </div>
    }

  </div>

</header>
